<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-info">

<div class="container mt-5">

    <div class="card p-4">

        <h2>Register Page</h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-success">
                Register
            </button>

        </form>

        <br>

        <a href="{% url 'login' %}">
            Back to Login
        </a>

    </div>

</div>

</body>
</html>
