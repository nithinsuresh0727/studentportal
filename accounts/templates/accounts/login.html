<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark">

<div class="container mt-5">

    <div class="card p-4">

        <h2>Login Page</h2>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   class="form-control mb-3">

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   class="form-control mb-3">

            <button class="btn btn-primary">
                Login
            </button>

        </form>

        <br>

        <a href="{% url 'register' %}">
            Create New Account
        </a>

    </div>

</div>

</body>
</html>
